<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>안전교육 관리자 대시보드</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; }

/* 헤더 - 메인페이지 top-bar와 동일 스타일 */
.top-bar {
  background: #C0392B;
  color: white;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 10;
}
.top-bar-left { display: flex; align-items: center; gap: 10px; }
.top-bar-left i { font-size: 20px; }
.top-bar-title { font-size: 16px; font-weight: 600; }
.top-bar-sub { font-size: 11px; opacity: 0.85; margin-top: 1px; }
.live-badge {
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.4);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 11px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 5px;
}
.live-dot { width: 6px; height: 6px; background: white; border-radius: 50%; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.divider { height: 8px; background: #f5f5f5; }

.container { padding: 16px; max-width: 900px; margin: 0 auto; }

/* 섹션 타이틀 - 메인페이지 section-title과 동일 */
.section-title {
  font-size: 12px;
  color: #888;
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 10px;
  padding: 16px 0 0;
}

/* 통계 카드 - 메인페이지 cat-btn 느낌 */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-bottom: 4px;
}
.stat-card {
  background: white;
  border: 1.5px solid #e0e0e0;
  border-radius: 12px;
  padding: 16px 14px;
}
.stat-label { font-size: 11px; color: #888; margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
.stat-label i { font-size: 13px; }
.stat-value { font-size: 28px; font-weight: 700; color: #222; line-height: 1; }
.stat-unit { font-size: 12px; color: #aaa; margin-top: 4px; }

.stat-card.red { border-color: #C0392B; background: #fef9f9; }
.stat-card.red .stat-label { color: #C0392B; }
.stat-card.red .stat-value { color: #C0392B; }

/* 차트 카드 - 메인페이지 video-item 느낌 */
.card {
  background: white;
  border: 1px solid #e0e0e0;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 8px;
}
.card-title {
  font-size: 13px;
  font-weight: 600;
  color: #222;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.card-title i { font-size: 16px; color: #C0392B; }

.chart-wrap { position: relative; height: 200px; }

/* 순위 목록 */
.rank-list { list-style: none; }
.rank-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid #f0f0f0;
}
.rank-item:last-child { border-bottom: none; }
.rank-num {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: #f5f5f5;
  color: #aaa;
  font-size: 11px;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.rank-num.top1 { background: #C0392B; color: white; }
.rank-num.top2 { background: #E65100; color: white; }
.rank-num.top3 { background: #1565C0; color: white; }
.rank-name { flex: 1; font-size: 13px; color: #333; }
.rank-tag { font-size: 11px; color: #aaa; margin-top: 1px; }
.rank-count {
  font-size: 12px; font-weight: 600; color: #C0392B;
  background: #fef9f9;
  border: 1px solid #f5c6c6;
  padding: 2px 10px;
  border-radius: 20px;
  flex-shrink: 0;
}

/* 카테고리 바 - 메인페이지 카테고리 색상 동일 */
.bar-wrap { }
.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.bar-label { font-size: 12px; color: #555; width: 72px; flex-shrink: 0; font-weight: 500; }
.bar-track { flex: 1; background: #f0f0f0; border-radius: 6px; height: 10px; }
.bar-fill { height: 10px; border-radius: 6px; transition: width 0.6s ease; }
.bar-val { font-size: 12px; color: #888; width: 28px; flex-shrink: 0; text-align: right; }

.refresh-btn {
  background: white;
  border: 1px solid #e0e0e0;
  color: #555;
  padding: 7px 14px;
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 4px;
}
.refresh-btn:active { background: #f5f5f5; }
.refresh-btn i { font-size: 14px; }

.loading { text-align: center; color: #bbb; padding: 30px; font-size: 13px; }
.empty { text-align: center; color: #ccc; padding: 20px; font-size: 13px; }

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  color: rgba(255,255,255,0.8);
  text-decoration: none;
}
.back-link:hover { color: white; }
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-left">
    <i class="ti ti-shield-check"></i>
    <div>
      <div class="top-bar-title">현장실습 안전교육 관리자</div>
      <div class="top-bar-sub">접속 및 영상 시청 현황</div>
    </div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
    <div class="live-badge"><div class="live-dot"></div>실시간</div>
    <a class="back-link" href="index.html"><i class="ti ti-arrow-left"></i>학생 페이지</a>
  </div>
</div>

<div class="container">

  <div class="section-title">전체 현황</div>

  <div class="stat-grid">
    <div class="stat-card red">
      <div class="stat-label"><i class="ti ti-users"></i>오늘 접속자</div>
      <div class="stat-value" id="today-visits">-</div>
      <div class="stat-unit">명</div>
    </div>
    <div class="stat-card">
      <div class="stat-label"><i class="ti ti-calendar"></i>전체 누적 접속</div>
      <div class="stat-value" id="total-visits">-</div>
      <div class="stat-unit">명</div>
    </div>
    <div class="stat-card red">
      <div class="stat-label"><i class="ti ti-player-play"></i>오늘 영상 클릭</div>
      <div class="stat-value" id="today-clicks">-</div>
      <div class="stat-unit">회</div>
    </div>
    <div class="stat-card">
      <div class="stat-label"><i class="ti ti-chart-bar"></i>전체 영상 클릭</div>
      <div class="stat-value" id="total-clicks">-</div>
      <div class="stat-unit">회</div>
    </div>
  </div>

  <div class="section-title">접속 추이</div>

  <div class="card">
    <div class="card-title"><i class="ti ti-calendar-stats"></i>최근 7일 접속자</div>
    <div class="chart-wrap"><canvas id="visitChart"></canvas></div>
  </div>

  <div class="card">
    <div class="card-title"><i class="ti ti-clock"></i>시간대별 접속</div>
    <div class="chart-wrap"><canvas id="hourChart"></canvas></div>
  </div>

  <div class="section-title">영상 통계</div>

  <div class="card">
    <div class="card-title"><i class="ti ti-trophy"></i>많이 본 영상 TOP 10</div>
    <ul class="rank-list" id="rank-list">
      <li class="loading">데이터 불러오는 중...</li>
    </ul>
  </div>

  <div class="card">
    <div class="card-title"><i class="ti ti-chart-bar"></i>카테고리별 클릭</div>
    <div class="bar-wrap" id="cat-bars">
      <div class="loading">데이터 불러오는 중...</div>
    </div>
  </div>

  <div style="text-align:center;padding:16px 0;">
    <button class="refresh-btn" onclick="loadData()" style="margin:0 auto;">
      <i class="ti ti-refresh"></i>새로고침
    </button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAt19XXmy0M5RQKesI7GikodLUFx-JEoQc",
  authDomain: "safety-guide-b4758.firebaseapp.com",
  projectId: "safety-guide-b4758",
  storageBucket: "safety-guide-b4758.firebasestorage.app",
  messagingSenderId: "381227429131",
  appId: "1:381227429131:web:6b26e86a2bbac2e4b6860e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

Chart.defaults.font.family = "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
Chart.defaults.font.size = 11;

let visitChartInst, hourChartInst;

window.loadData = async function() {
  const now = new Date();
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());

  const visitSnap = await getDocs(collection(db, 'visits'));
  const visits = [];
  visitSnap.forEach(doc => {
    const d = doc.data();
    if (d.timestamp) visits.push(d.timestamp.toDate());
  });

  document.getElementById('today-visits').textContent = visits.filter(d => d >= todayStart).length;
  document.getElementById('total-visits').textContent = visits.length;

  const clickSnap = await getDocs(collection(db, 'clicks'));
  const clicks = [];
  clickSnap.forEach(doc => {
    const d = doc.data();
    if (d.timestamp) clicks.push({ ...d, date: d.timestamp.toDate() });
  });

  document.getElementById('today-clicks').textContent = clicks.filter(c => c.date >= todayStart).length;
  document.getElementById('total-clicks').textContent = clicks.length;

  // 7일 접속자
  const days7 = [], days7Labels = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth(), now.getDate() - i);
    const next = new Date(d); next.setDate(next.getDate() + 1);
    days7.push(visits.filter(v => v >= d && v < next).length);
    days7Labels.push(`${d.getMonth()+1}/${d.getDate()}`);
  }
  if (visitChartInst) visitChartInst.destroy();
  visitChartInst = new Chart(document.getElementById('visitChart'), {
    type: 'bar',
    data: {
      labels: days7Labels,
      datasets: [{ data: days7, backgroundColor: '#C0392B', borderRadius: 6 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: '#f0f0f0' }, ticks: { color: '#888' } },
        y: { grid: { color: '#f0f0f0' }, ticks: { color: '#888', stepSize: 1 }, beginAtZero: true }
      }
    }
  });

  // 시간대별
  const hours = Array(24).fill(0);
  visits.forEach(v => { hours[v.getHours()]++; });
  if (hourChartInst) hourChartInst.destroy();
  hourChartInst = new Chart(document.getElementById('hourChart'), {
    type: 'line',
    data: {
      labels: Array.from({length: 24}, (_, i) => i % 3 === 0 ? `${i}시` : ''),
      datasets: [{
        data: hours,
        borderColor: '#C0392B',
        backgroundColor: 'rgba(192,57,43,0.08)',
        fill: true, tension: 0.4, pointRadius: 2,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: '#f0f0f0' }, ticks: { color: '#888' } },
        y: { grid: { color: '#f0f0f0' }, ticks: { color: '#888', stepSize: 1 }, beginAtZero: true }
      }
    }
  });

  // TOP 10
  const videoCount = {};
  clicks.forEach(c => {
    const key = c.videoName || '기타';
    if (!videoCount[key]) videoCount[key] = { count: 0, risk: c.risk || '' };
    videoCount[key].count++;
  });
  const sorted = Object.entries(videoCount).sort((a,b) => b[1].count - a[1].count).slice(0, 10);
  const rankList = document.getElementById('rank-list');
  if (sorted.length === 0) {
    rankList.innerHTML = '<li class="empty">아직 데이터가 없어요</li>';
  } else {
    rankList.innerHTML = sorted.map(([name, info], i) =>
      `<li class="rank-item">
        <div class="rank-num ${i===0?'top1':i===1?'top2':i===2?'top3':''}">${i+1}</div>
        <div>
          <div class="rank-name">${name}</div>
          ${info.risk ? `<div class="rank-tag">위험요인: ${info.risk}</div>` : ''}
        </div>
        <div class="rank-count">${info.count}회</div>
      </li>`
    ).join('');
  }

  // 카테고리
  const catMap = { '기계제조업': 0, '서비스직': 0, '사무직': 0, '공통': 0 };
  const catColors = { '기계제조업': '#E65100', '서비스직': '#2E7D32', '사무직': '#1565C0', '공통': '#C0392B' };
  const machineKw = ['컨베이어','차량계','연삭기','선반','로봇','밀링','물건운반','가스용접','전기·기계'];
  const serviceKw = ['주방조리','음식서비스','감정노동'];
  const officeKw = ['전산작업'];

  clicks.forEach(c => {
    const n = c.videoName || '';
    if (machineKw.some(k => n.includes(k))) catMap['기계제조업']++;
    else if (serviceKw.some(k => n.includes(k))) catMap['서비스직']++;
    else if (officeKw.some(k => n.includes(k))) catMap['사무직']++;
    else catMap['공통']++;
  });

  const maxCat = Math.max(...Object.values(catMap), 1);
  document.getElementById('cat-bars').innerHTML = Object.entries(catMap).map(([label, val]) =>
    `<div class="bar-row">
      <div class="bar-label">${label}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(val/maxCat*100)}%;background:${catColors[label]}"></div></div>
      <div class="bar-val">${val}</div>
    </div>`
  ).join('');
}

loadData();
</script>
</body>
</html>
