<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>현장실습 안전교육</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; max-width: 480px; margin: 0 auto; }

.top-bar {
  background: #C0392B;
  color: white;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 10;
}
.top-bar i { font-size: 20px; }
.top-bar-text { flex: 1; }
.top-bar-label { font-size: 11px; opacity: 0.85; }
.top-bar-number { font-size: 18px; font-weight: 500; letter-spacing: 1px; }
.call-btn {
  background: white;
  color: #C0392B;
  border: none;
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  text-decoration: none;
}

.divider { height: 8px; background: #f5f5f5; }

.section { padding: 16px 16px 8px; }
.section-title {
  font-size: 12px;
  color: #888;
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.category-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  padding: 0 16px 16px;
}
.cat-btn {
  background: white;
  border: 1px solid #e0e0e0;
  border-radius: 12px;
  padding: 14px 10px;
  cursor: pointer;
  text-align: center;
  transition: border-color 0.15s;
}
.cat-btn.active { border: 2px solid #C0392B; }
.cat-btn i { font-size: 22px; color: #888; display: block; margin-bottom: 6px; }
.cat-btn.active i { color: #C0392B; }
.cat-btn span { font-size: 13px; font-weight: 500; color: #222; display: block; }
.cat-btn small { font-size: 11px; color: #aaa; display: block; margin-top: 2px; }

.video-list { padding: 0 16px 16px; display: none; }
.video-list.visible { display: block; }
.video-list-title {
  font-size: 14px;
  font-weight: 500;
  color: #222;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.video-item {
  background: white;
  border: 1px solid #e0e0e0;
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 8px;
  cursor: pointer;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  text-align: left;
  width: 100%;
  transition: border-color 0.15s;
}
.video-item:active { background: #fef9f9; border-color: #C0392B; }
.video-item i { font-size: 20px; color: #C0392B; flex-shrink: 0; margin-top: 1px; }
.video-item-name { font-size: 13px; font-weight: 500; color: #222; line-height: 1.4; }
.video-item-tag { font-size: 11px; color: #888; margin-top: 3px; }

.player-wrap { padding: 0 16px 16px; display: none; }
.player-wrap.visible { display: block; }
.player-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
  padding-top: 16px;
}
.back-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: #666;
  font-size: 22px;
  padding: 0;
  display: flex;
  align-items: center;
}
.player-title { font-size: 14px; font-weight: 500; color: #222; flex: 1; line-height: 1.4; }
.video-frame {
  border-radius: 12px;
  overflow: hidden;
  background: #000;
  aspect-ratio: 16/11;
  width: 100%;
}
.video-frame iframe { width: 100%; height: 100%; border: none; display: block; }
.notice-box {
  background: #f5f5f5;
  border-radius: 8px;
  padding: 10px 12px;
  margin-top: 10px;
  font-size: 12px;
  color: #888;
  display: flex;
  gap: 6px;
  align-items: flex-start;
}
.notice-box i { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
</style>
</head>
<body>

<div class="top-bar">
  <i class="ti ti-shield-check"></i>
  <div class="top-bar-text">
    <div class="top-bar-label">지도교사 긴급연락처</div>
    <div class="top-bar-number">010-0000-0000</div>
  </div>
  <a class="call-btn" href="tel:01000000000">
    <i class="ti ti-phone"></i>전화
  </a>
</div>

<div class="divider"></div>

  <div id="video-list-office" class="video-list">
    <div class="video-list-title"><i class="ti ti-device-desktop"></i> 사무직</div>
    <button class="video-item" onclick="playVideo('전산작업 안전교육', '신체·중증장애', '1aLhqzyePBCJ_2zCjEIfVUDB3VA4fwKey')">
      <i class="ti ti-player-play"></i>

    <button class="video-item" onclick="playVideo('컨베이어벨트 안전교육', '끼임·감김·말림', '1qLlODSHT6TBbv8qQH06tE-KJ53_vPbM9')">

      <div><div class="video-item-name">차량계 하역운반 안전교육</div><div class="video-item-tag">위험요인: 충돌·타격</div></div>
    </button>
    <button class="video-item" onclick="playVideo('연삭기 안전교육', '폭발', '1NKwcSvBFD7pr7gc9mp8_MUATNV2XiwrO')">
      <i class="ti ti-player-play"></i>
      <div><div class="video-item-name">연삭기 안전교육</div><div class="video-item-tag">위험요인: 폭발</div></div>
    </button>
    <button class="video-item" onclick="playVideo('연삭기 안전교육', '충돌·타격', '13XUebgNA4l5K-jIskg59ZnUsKTzltg8a')">
      <i class="ti ti-player-play"></i>
      <div><div class="video-item-name">연삭기 안전교육</div><div class="video-item-tag">위험요인: 충돌·타격</div></div>
    </button>

      <i class="ti ti-player-play"></i>
      <div><div class="video-item-name">선반 안전교육</div><div class="video-item-tag">위험요인: 충돌·타격</div></div>
    </button>
    <button class="video-item" onclick="playVideo('선반 안전교육', '끼임·감김·말림', '1j79ZsXVQA_qBwUYmtoCkfw8eYB3Blz52')">
      <i class="ti ti-player-play"></i>
      <div><div class="video-item-name">선반 안전교육</div><div class="video-item-tag">위험요인: 끼임·감김·말림</div></div>
    </button>
    <button class="video-item" onclick="playVideo('산업용 로봇 안전교육', '충돌·타격', '1GjtRNcsJi7iHxwuwVM7cQaURAOXq34za')">
      <i class="ti ti-player-play"></i>

    </button>

      <div><div class="video-item-name">물건운반 안전교육</div><div class="video-item-tag">위험요인: 추락·넘어짐</div></div>

<div id="player-view" class="player-wrap">
  <div class="player-header">
    <button class="back-btn" onclick="goBack()">
      <i class="ti ti-arrow-left"></i>
    </button>
    <div class="player-title" id="player-title"></div>
  </div>
  <div class="video-frame">
    <iframe id="video-iframe" allowfullscreen allow="autoplay"></iframe>
  </div>
  <div class="notice-box">
    <i class="ti ti-info-circle"></i>
    <span>영상이 재생되지 않으면 구글 드라이브 로그인 후 다시 시도해주세요.</span>
  </div>
</div>

<script>
function selectCat(cat) {
  var cats = ['service','office','machine','common'];
  var btns = document.querySelectorAll('.cat-btn');
  cats.forEach(function(c, i) {
    var list = document.getElementById('video-list-' + c);
    if (c === cat) {
      list.classList.toggle('visible');
      btns[i].classList.toggle('active', list.classList.contains('visible'));
    } else {
      list.classList.remove('visible');
      btns[i].classList.remove('active');
    }
  });
}

function playVideo(name, risk, fileId) {
  document.getElementById('player-title').textContent = name + ' — ' + risk;
  document.getElementById('video-iframe').src = 'https://drive.google.com/file/d/' + fileId + '/preview';
  document.getElementById('main-view').style.display = 'none';
  document.getElementById('player-view').classList.add('visible');
  window.scrollTo(0, 0);
}

function goBack() {
  document.getElementById('video-iframe').src = '';
  document.getElementById('player-view').classList.remove('visible');
  document.getElementById('main-view').style.display = '';
  window.scrollTo(0, 0);
}
</script>
</body>
</html>
