<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>현장실습 안전교육</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; max-width: 480px; margin: 0 auto; }

.top-bar {
  background: #C0392B;
  color: white;
  padding: 12px 16px 10px;
  position: sticky;
  top: 0;
  z-index: 10;
}
.top-bar-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 10px;
}
.top-bar-header i { font-size: 16px; opacity: 0.9; }
.top-bar-header span { font-size: 12px; opacity: 0.9; font-weight: 500; letter-spacing: 0.3px; }
.contact-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
}
.contact-item {
  background: rgba(255,255,255,0.15);
  border-radius: 8px;
  padding: 8px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
}
.contact-info { flex: 1; min-width: 0; }
.contact-role { font-size: 10px; opacity: 0.85; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.contact-number { font-size: 13px; font-weight: 500; letter-spacing: 0.5px; }
.call-btn {
  background: white;
  color: #C0392B;
  border: none;
  border-radius: 6px;
  padding: 5px 8px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 3px;
  text-decoration: none;
  flex-shrink: 0;
}
.call-btn i { font-size: 13px; }

.divider { height: 8px; background: #f5f5f5; }

.section { padding: 16px 16px 8px; }
.section-title {
  font-size: 12px;
  color: #888;
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.category-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 0 16px 16px;
}
.cat-btn {
  background: white;
  border: 1.5px solid #e0e0e0;
  border-radius: 12px;
  padding: 14px 6px;
  cursor: pointer;
  text-align: center;
  transition: opacity 0.15s;
}
.cat-btn i { font-size: 22px; display: block; margin-bottom: 6px; }
.cat-btn span { font-size: 12px; font-weight: 600; display: block; }
.cat-btn small { font-size: 10px; display: block; margin-top: 3px; opacity: 0.75; }

.cat-btn.machine { background: #FFF3E0; border-color: #E65100; }
.cat-btn.machine i, .cat-btn.machine span { color: #E65100; }
.cat-btn.machine small { color: #E65100; }
.cat-btn.machine.active { background: #E65100; border-color: #E65100; }
.cat-btn.machine.active i, .cat-btn.machine.active span, .cat-btn.machine.active small { color: white; }

.cat-btn.service { background: #E8F5E9; border-color: #2E7D32; }
.cat-btn.service i, .cat-btn.service span { color: #2E7D32; }
.cat-btn.service small { color: #2E7D32; }
.cat-btn.service.active { background: #2E7D32; border-color: #2E7D32; }
.cat-btn.service.active i, .cat-btn.service.active span, .cat-btn.service.active small { color: white; }

.cat-btn.office { background: #E3F2FD; border-color: #1565C0; }
.cat-btn.office i, .cat-btn.office span { color: #1565C0; }
.cat-btn.office small { color: #1565C0; }
.cat-btn.office.active { background: #1565C0; border-color: #1565C0; }
.cat-btn.office.active i, .cat-btn.office.active span, .cat-btn.office.active small { color: white; }

.video-list { padding: 0 16px 16px; display: none; }
.video-list.visible { display: block; }
.video-list-title {
  font-size: 14px;
  font-weight: 500;
  color: #222;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.video-item {
  background: white;
  border: 1px solid #e0e0e0;
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 8px;
  cursor: pointer;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  text-align: left;
  width: 100%;
  transition: border-color 0.15s;
}
.video-item:active { background: #fef9f9; border-color: #C0392B; }
.video-item i { font-size: 20px; color: #C0392B; flex-shrink: 0; margin-top: 1px; }
.video-item-name { font-size: 13px; font-weight: 500; color: #222; line-height: 1.4; }
.video-item-tag { font-size: 11px; color: #888; margin-top: 3px; }

.player-wrap { padding: 0 16px 16px; display: none; }
.player-wrap.visible { display: block; }
.player-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
  padding-top: 16px;
}
.back-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: #666;
  font-size: 22px;
  padding: 0;
  display: flex;
  align-items: center;
}
.player-title { font-size: 14px; font-weight: 500; color: #222; flex: 1; line-height: 1.4; }
.video-frame {
  border-radius: 12px;
  overflow: hidden;
  background: #000;
  aspect-ratio: 16/13;
  width: 100%;
}
.video-frame iframe { width: 100%; height: 100%; border: none; display: block; }
.notice-box {

  margin-top: 10px;
  font-size: 12px;
  color: #888;
  display: flex;
  gap: 6px;

}
.notice-box i { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
</style>

<script>
function selectCat(cat) {
  var cats = ['machine','service','office'];
  var btns = document.querySelectorAll('.cat-btn');
  cats.forEach(function(c, i) {
    var list = document.getElementById('video-list-' + c);
    if (c === cat) {
      list.classList.toggle('visible');
      btns[i].classList.toggle('active', list.classList.contains('visible'));
    } else {
      list.classList.remove('visible');
      btns[i].classList.remove('active');
    }
  });
}

function playVideo(name, risk, fileId) {
  document.getElementById('player-title').textContent = name + ' — ' + risk;
  document.getElementById('video-iframe').src = 'https://www.youtube.com/embed/' + fileId + '?autoplay=1';
  document.getElementById('main-view').style.display = 'none';
  document.getElementById('player-view').classList.add('visible');
  window.scrollTo(0, 0);
}

function goBack() {
  document.getElementById('video-iframe').src = '';
  document.getElementById('player-view').classList.remove('visible');
  document.getElementById('main-view').style.display = '';
  window.scrollTo(0, 0);
}
</script>
